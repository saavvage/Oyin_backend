version: '3.9'

services:
  oyin-db:
    image: postgres:15
    container_name: oyin-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sportmatch_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - oyin_db_data:/var/lib/postgresql/data

  oyin-minio:
    image: minio/minio:latest
    container_name: oyin-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - oyin_minio_data:/data

  oyin-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oyin-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DB_HOST: oyin-db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: sportmatch_dev
      JWT_SECRET: dev_secret
      MINIO_ENDPOINT: oyin-minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
    ports:
      - '3000:3000'
    depends_on:
      - oyin-db
      - oyin-minio
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run start:dev

volumes:
  oyin_db_data:
  oyin_minio_data:
