version: '3.9'

services:
  oyin-db:
    image: postgres:15
    container_name: oyin-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sportmatch_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - oyin_db_data:/var/lib/postgresql/data

  oyin-minio:
    image: minio/minio:latest
    container_name: oyin-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - oyin_minio_data:/data

  oyin-ml:
    build:
      context: ../oyin_ml
      dockerfile: Dockerfile
    container_name: oyin-ml
    restart: unless-stopped
    env_file:
      - ../oyin_ml/.env
    ports:
      - '8000:8000'
    volumes:
      - ../oyin_ml/models:/app/models
      - ../oyin_ml/chroma_db:/app/chroma_db
      - ../oyin_ml/rag_files:/app/rag_files

  oyin-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oyin-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override DB/Minio hosts to use Docker service names
      DB_HOST: oyin-db
      DB_PORT: 5432
      MINIO_ENDPOINT: oyin-minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      # ML service inside Docker network
      ML_SERVICE_URL: http://oyin-ml:8000
    ports:
      - '3000:3000'
    depends_on:
      - oyin-db
      - oyin-minio
      - oyin-ml
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run start:dev

volumes:
  oyin_db_data:
  oyin_minio_data:
